# SwiftLint Configuration for VSCode iPadOS
# See: https://github.com/realm/SwiftLint

included:
  - VSCodeiPadOS

excluded:
  - VSCodeiPadOS/Tests
  - VSCodeiPadOS/UITests
  - build
  - .build
  - Packages

# Rules
opt_in_rules:
  - closure_spacing
  - contains_over_filter_is_empty
  - empty_count
  - empty_string
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - trailing_whitespace
  - line_length
  - type_body_length
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - function_parameter_count
  - type_name
  - identifier_name
  - large_tuple
  - nesting
  - force_cast  # Already cleaned up
  - force_try   # Already cleaned up
  - todo        # We track TODOs in BACKLOG.md

# Customizations
line_length:
  warning: 200
  error: 300

type_body_length:
  warning: 500
  error: 1000

file_length:
  warning: 1000
  error: 2000

reporter: "xcode"

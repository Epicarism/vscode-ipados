name: Daily Green

on:
  schedule:
    # Runs every day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # manual trigger too

jobs:
  green:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Make daily commit
        run: |
          git config user.name "Epicarism"
          git config user.email "epicarism@email.com"
          echo "$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> activity.log
          git add activity.log
          git commit -m "📅 $(date -u +'%Y-%m-%d')"
          git push

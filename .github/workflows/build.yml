name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iPadOS App
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve packages
        run: |
          cd VSCodeiPadOS
          xcodebuild -resolvePackageDependencies \
            -project VSCodeiPadOS.xcodeproj \
            -scheme VSCodeiPadOS

      - name: Build for iPad Simulator
        run: |
          cd VSCodeiPadOS
          xcodebuild build \
            -project VSCodeiPadOS.xcodeproj \
            -scheme VSCodeiPadOS \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Run Unit Tests
        run: |
          cd VSCodeiPadOS
          xcodebuild test \
            -project VSCodeiPadOS.xcodeproj \
            -scheme VSCodeiPadOS \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4)' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color
        continue-on-error: true

  lint:
    name: Swift Lint
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          cd VSCodeiPadOS
          swiftlint lint --reporter github-actions-logging || true

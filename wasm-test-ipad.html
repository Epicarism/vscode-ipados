<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASM Test - iPadOS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    padding: 20px; max-width: 900px; margin: 0 auto;
    -webkit-text-size-adjust: 100%;
  }
  h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
  .test-group { margin-bottom: 24px; }
  .test-group h2 {
    font-size: 16px; color: #aaa; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
    border-bottom: 1px solid #222; padding-bottom: 8px;
  }
  .test {
    background: #141414; border: 1px solid #222; border-radius: 12px;
    padding: 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color 0.3s;
  }
  .test.pass { border-color: #2d5a2d; }
  .test.fail { border-color: #5a2d2d; }
  .test.running { border-color: #5a5a2d; }
  .indicator {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .indicator.pass { background: #1a3a1a; color: #4ade80; }
  .indicator.fail { background: #3a1a1a; color: #f87171; }
  .indicator.running { background: #3a3a1a; color: #facc15; }
  .indicator.waiting { background: #1a1a1a; color: #555; }
  .test-info { flex: 1; min-width: 0; }
  .test-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .test-detail { font-size: 13px; color: #888; word-break: break-all; }
  .test-detail code { color: #93c5fd; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; }
  .test-time { font-size: 12px; color: #666; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .summary {
    background: #141414; border: 1px solid #333; border-radius: 16px;
    padding: 24px; margin-top: 32px; text-align: center;
  }
  .summary .big { font-size: 48px; font-weight: 700; margin-bottom: 8px; }
  .summary .big.all-pass { color: #4ade80; }
  .summary .big.some-fail { color: #f87171; }
  .summary .label { color: #888; font-size: 14px; }
  canvas {
    border: 1px solid #333; border-radius: 8px;
    margin-top: 8px; image-rendering: pixelated;
    width: 100%; max-width: 512px;
  }
  .canvas-wrap { text-align: center; margin-top: 12px; }
  #log {
    background: #0d0d0d; border: 1px solid #222; border-radius: 8px;
    padding: 12px; margin-top: 24px; font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px; color: #666; max-height: 200px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  @media (prefers-color-scheme: light) {
    body { background: #f5f5f5; color: #222; }
    .test { background: #fff; border-color: #ddd; }
    h1 { color: #000; }
  }
</style>
</head>
<body>

<h1>🧪 WebAssembly Test Suite</h1>
<p class="subtitle" id="ua"></p>

<div id="tests"></div>

<div class="canvas-wrap" id="canvas-section" style="display:none">
  <canvas id="fractal" width="256" height="256"></canvas>
  <p style="color:#888;font-size:12px;margin-top:6px">Mandelbrot fractal rendered by WASM</p>
</div>

<div class="summary" id="summary" style="display:none">
  <div class="big" id="summary-result"></div>
  <div class="label" id="summary-label"></div>
</div>

<div id="log"></div>

<script>
const logEl = document.getElementById('log');
const ua = navigator.userAgent;
document.getElementById('ua').textContent = ua;

function log(msg) {
  const ts = new Date().toISOString().slice(11, 23);
  logEl.textContent += `[${ts}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

const testsEl = document.getElementById('tests');
let results = [];
let currentGroup = null;

function group(name) {
  const g = document.createElement('div');
  g.className = 'test-group';
  g.innerHTML = `<h2>${name}</h2>`;
  testsEl.appendChild(g);
  currentGroup = g;
}

function addTest(name) {
  const el = document.createElement('div');
  el.className = 'test running';
  el.innerHTML = `
    <div class="indicator running" id="ind-${results.length}">⏳</div>
    <div class="test-info">
      <div class="test-name">${name}</div>
      <div class="test-detail" id="detail-${results.length}">Running…</div>
    </div>
    <div class="test-time" id="time-${results.length}"></div>
  `;
  (currentGroup || testsEl).appendChild(el);
  const idx = results.length;
  results.push({ name, el, pass: null });
  return idx;
}

function pass(idx, detail, ms) {
  const r = results[idx];
  r.pass = true; r.el.className = 'test pass';
  document.getElementById(`ind-${idx}`).className = 'indicator pass';
  document.getElementById(`ind-${idx}`).textContent = '✓';
  document.getElementById(`detail-${idx}`).innerHTML = detail;
  if (ms != null) document.getElementById(`time-${idx}`).textContent = ms.toFixed(1) + 'ms';
  log(`PASS: ${r.name}`);
}

function fail(idx, detail) {
  const r = results[idx];
  r.pass = false; r.el.className = 'test fail';
  document.getElementById(`ind-${idx}`).className = 'indicator fail';
  document.getElementById(`ind-${idx}`).textContent = '✗';
  document.getElementById(`detail-${idx}`).innerHTML = detail;
  log(`FAIL: ${r.name} — ${detail}`);
}

function showSummary() {
  const passed = results.filter(r => r.pass === true).length;
  const total = results.length;
  const allPass = passed === total;
  document.getElementById('summary').style.display = '';
  const big = document.getElementById('summary-result');
  big.textContent = allPass ? '✅ ALL PASS' : `${passed}/${total}`;
  big.className = 'big ' + (allPass ? 'all-pass' : 'some-fail');
  document.getElementById('summary-label').textContent =
    `${passed} of ${total} tests passed on ${/iPad|iPhone/.test(ua) ? 'iPadOS/iOS' : 'this device'}`;
}

// === WASM BINARY BUILDERS ===

function u32(v) {
  const out = [];
  do { let b = v & 0x7f; v >>>= 7; if (v) b |= 0x80; out.push(b); } while (v);
  return out;
}

function section(id, content) {
  return [id, ...u32(content.length), ...content];
}

function vec(items) {
  const flat = items.flat();
  return [...u32(items.length), ...flat];
}

const HEADER = [0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00];

function str(s) {
  const enc = new TextEncoder().encode(s);
  return [...u32(enc.length), ...enc];
}

// add(i32, i32) -> i32
function buildAddModule() {
  const typeContent = vec([[0x60, ...vec([[0x7f], [0x7f]]), ...vec([[0x7f]])]]);
  const funcContent = vec([[0x00]]);
  const exportContent = vec([[...str('add'), 0x00, ...u32(0)]]);
  const body = [0x00, 0x20, 0x00, 0x20, 0x01, 0x6a, 0x0b];
  const codeContent = vec([[...u32(body.length), ...body]]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// fibonacci(i32) -> i32 (recursive)
function buildFibModule() {
  const typeContent = vec([[0x60, ...vec([[0x7f]]), ...vec([[0x7f]])]]);
  const funcContent = vec([[0x00]]);
  const exportContent = vec([[...str('fib'), 0x00, ...u32(0)]]);
  const body = [
    0x00,
    0x20, 0x00, 0x41, 0x02, 0x49, 0x04, 0x7f,
      0x20, 0x00,
    0x05,
      0x20, 0x00, 0x41, 0x01, 0x6b, 0x10, 0x00,
      0x20, 0x00, 0x41, 0x02, 0x6b, 0x10, 0x00,
      0x6a,
    0x0b, 0x0b
  ];
  const codeContent = vec([[...u32(body.length), ...body]]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// factorial(i32) -> i64
function buildFactorialModule() {
  const typeContent = vec([[0x60, ...vec([[0x7f]]), ...vec([[0x7e]])]]);
  const funcContent = vec([[0x00]]);
  const exportContent = vec([[...str('factorial'), 0x00, ...u32(0)]]);
  const body = [
    0x01, 0x01, 0x7e,
    0x42, 0x01, 0x21, 0x01,
    0x02, 0x40, 0x03, 0x40,
      0x20, 0x00, 0x41, 0x00, 0x4c, 0x0d, 0x01,
      0x20, 0x01, 0x20, 0x00, 0xac, 0x7e, 0x21, 0x01,
      0x20, 0x00, 0x41, 0x01, 0x6b, 0x21, 0x00,
      0x0c, 0x00,
    0x0b, 0x0b,
    0x20, 0x01, 0x0b
  ];
  const codeContent = vec([[...u32(body.length), ...body]]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// memory: store/load/size + exported memory
function buildMemoryModule() {
  const typeContent = vec([
    [0x60, ...vec([[0x7f],[0x7f]]), ...vec([])],
    [0x60, ...vec([[0x7f]]), ...vec([[0x7f]])],
    [0x60, ...vec([]), ...vec([[0x7f]])]
  ]);
  const funcContent = vec([[0x00], [0x01], [0x02]]);
  const memContent = vec([[0x00, ...u32(1)]]);
  const exportContent = vec([
    [...str('mem'), 0x02, ...u32(0)],
    [...str('store'), 0x00, ...u32(0)],
    [...str('load'), 0x00, ...u32(1)],
    [...str('size'), 0x00, ...u32(2)],
  ]);
  const storeBody = [0x00, 0x20, 0x00, 0x20, 0x01, 0x36, 0x02, 0x00, 0x0b];
  const loadBody = [0x00, 0x20, 0x00, 0x28, 0x02, 0x00, 0x0b];
  const sizeBody = [0x00, 0x3f, 0x00, 0x0b];
  const codeContent = vec([
    [...u32(storeBody.length), ...storeBody],
    [...u32(loadBody.length), ...loadBody],
    [...u32(sizeBody.length), ...sizeBody]
  ]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(5, memContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// mutable global counter
function buildGlobalsModule() {
  const typeContent = vec([
    [0x60, ...vec([]), ...vec([[0x7f]])],
    [0x60, ...vec([]), ...vec([])]
  ]);
  const funcContent = vec([[0x00], [0x01]]);
  const globalContent = vec([[0x7f, 0x01, 0x41, 0x00, 0x0b]]);
  const exportContent = vec([
    [...str('get'), 0x00, ...u32(0)],
    [...str('inc'), 0x00, ...u32(1)],
  ]);
  const getBody = [0x00, 0x23, 0x00, 0x0b];
  const incBody = [0x00, 0x23, 0x00, 0x41, 0x01, 0x6a, 0x24, 0x00, 0x0b];
  const codeContent = vec([
    [...u32(getBody.length), ...getBody],
    [...u32(incBody.length), ...incBody]
  ]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(6, globalContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// JS imports — WASM calls JS callback
function buildImportModule() {
  const typeContent = vec([
    [0x60, ...vec([[0x7f]]), ...vec([])],
    [0x60, ...vec([]), ...vec([])]
  ]);
  const importContent = vec([[...str('env'), ...str('callback'), 0x00, ...u32(0)]]);
  const funcContent = vec([[0x01]]);
  const exportContent = vec([[...str('run'), 0x00, ...u32(1)]]);
  const body = [0x00, 0x41, 0x2a, 0x10, 0x00, 0x41, 0xe3, 0x00, 0x10, 0x00, 0x0b];
  const codeContent = vec([[...u32(body.length), ...body]]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(2, importContent), ...section(3, funcContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// table + indirect call
function buildTableModule() {
  const typeContent = vec([
    [0x60, ...vec([]), ...vec([[0x7f]])],
    [0x60, ...vec([[0x7f]]), ...vec([[0x7f]])]
  ]);
  const funcContent = vec([[0x00], [0x00], [0x01]]);
  const tableContent = vec([[0x70, 0x00, ...u32(2)]]);
  const elemContent = vec([[0x00, 0x41, 0x00, 0x0b, ...vec([[...u32(0)], [...u32(1)]])]]);
  const exportContent = vec([[...str('dispatch'), 0x00, ...u32(2)]]);
  const f0Body = [0x00, 0x41, 0xef, 0x00, 0x0b];
  const f1Body = [0x00, 0x41, 0xde, 0x01, 0x0b];
  const dispatchBody = [0x00, 0x20, 0x00, 0x11, 0x00, 0x00, 0x0b];
  const codeContent = vec([
    [...u32(f0Body.length), ...f0Body],
    [...u32(f1Body.length), ...f1Body],
    [...u32(dispatchBody.length), ...dispatchBody]
  ]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(4, tableContent), ...section(7, exportContent), ...section(9, elemContent), ...section(10, codeContent)]);
}

// f64 math
function buildFloatModule() {
  const typeContent = vec([
    [0x60, ...vec([[0x7c]]), ...vec([[0x7c]])],
    [0x60, ...vec([[0x7c],[0x7c]]), ...vec([[0x7c]])]
  ]);
  const funcContent = vec([[0x00], [0x01]]);
  const exportContent = vec([
    [...str('sqrt'), 0x00, ...u32(0)],
    [...str('hypot'), 0x00, ...u32(1)]
  ]);
  const sqrtBody = [0x00, 0x20, 0x00, 0x9f, 0x0b];
  const hypotBody = [0x00, 0x20, 0x00, 0x20, 0x00, 0xa2, 0x20, 0x01, 0x20, 0x01, 0xa2, 0xa0, 0x9f, 0x0b];
  const codeContent = vec([
    [...u32(sqrtBody.length), ...sqrtBody],
    [...u32(hypotBody.length), ...hypotBody]
  ]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// Mandelbrot — writes iteration counts into WASM memory
function buildMandelbrotModule() {
  const typeContent = vec([[0x60, ...vec([[0x7f],[0x7f],[0x7f]]), ...vec([])]]);
  const funcContent = vec([[0x00]]);
  const memContent = vec([[0x00, ...u32(4)]]);
  const exportContent = vec([
    [...str('mem'), 0x02, ...u32(0)],
    [...str('render'), 0x00, ...u32(0)]
  ]);
  const body = [
    0x04, 0x04, 0x7f, 0x02, 0x7c, 0x02, 0x7c, 0x02, 0x7c,
    // offset=0, y=0
    0x41, 0x00, 0x21, 0x06,
    0x41, 0x00, 0x21, 0x04,
    // y loop
    0x02, 0x40, 0x03, 0x40,
      0x20, 0x04, 0x20, 0x01, 0x4d, 0x0d, 0x01,
      // cy = (y/height)*3.0 - 1.5
      0x20, 0x04, 0xb7, 0x20, 0x01, 0xb7, 0xa3,
      0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0x08,0x40,
      0xa2,
      0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0xf8,0xbf,
      0xa0, 0x21, 0x08,
      // x=0
      0x41, 0x00, 0x21, 0x03,
      // x loop
      0x02, 0x40, 0x03, 0x40,
        0x20, 0x03, 0x20, 0x00, 0x4d, 0x0d, 0x01,
        // cx = (x/width)*3.5 - 2.5
        0x20, 0x03, 0xb7, 0x20, 0x00, 0xb7, 0xa3,
        0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0x0c,0x40,
        0xa2,
        0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0x04,0xc0,
        0xa0, 0x21, 0x07,
        // zr=0, zi=0
        0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00, 0x21, 0x09,
        0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00, 0x21, 0x0a,
        // iter=0
        0x41, 0x00, 0x21, 0x05,
        // iter loop
        0x02, 0x40, 0x03, 0x40,
          0x20, 0x05, 0x20, 0x02, 0x4d, 0x0d, 0x01,
          // tr=zr*zr, ti=zi*zi
          0x20, 0x09, 0x20, 0x09, 0xa2, 0x21, 0x0b,
          0x20, 0x0a, 0x20, 0x0a, 0xa2, 0x21, 0x0c,
          // if tr+ti > 4.0 break
          0x20, 0x0b, 0x20, 0x0c, 0xa0,
          0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0x10,0x40,
          0x64, 0x0d, 0x01,
          // zi = 2*zr*zi + cy
          0x44, 0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x40,
          0x20, 0x09, 0xa2, 0x20, 0x0a, 0xa2, 0x20, 0x08, 0xa0, 0x21, 0x0a,
          // zr = tr - ti + cx
          0x20, 0x0b, 0x20, 0x0c, 0xa1, 0x20, 0x07, 0xa0, 0x21, 0x09,
          // iter++
          0x20, 0x05, 0x41, 0x01, 0x6a, 0x21, 0x05,
          0x0c, 0x00,
        0x0b, 0x0b,
        // mem[offset] = iter
        0x20, 0x06, 0x20, 0x05, 0x3a, 0x00, 0x00,
        // offset++, x++
        0x20, 0x06, 0x41, 0x01, 0x6a, 0x21, 0x06,
        0x20, 0x03, 0x41, 0x01, 0x6a, 0x21, 0x03,
        0x0c, 0x00,
      0x0b, 0x0b,
      // y++
      0x20, 0x04, 0x41, 0x01, 0x6a, 0x21, 0x04,
      0x0c, 0x00,
    0x0b, 0x0b,
    0x0b
  ];
  const codeContent = vec([[...u32(body.length), ...body]]);
  return new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(5, memContent), ...section(7, exportContent), ...section(10, codeContent)]);
}

// === RUN ALL TESTS ===
async function runTests() {
  log('Starting WASM test suite...');
  log('UA: ' + ua);
  log('');

  group('Basic Support');

  { // WebAssembly global
    const idx = addTest('WebAssembly global object');
    try {
      if (typeof WebAssembly === 'object') {
        const keys = Object.keys(WebAssembly).sort().join(', ');
        pass(idx, `<code>typeof WebAssembly === "object"</code><br>Keys: <code>${keys}</code>`);
      } else fail(idx, `typeof WebAssembly === "${typeof WebAssembly}"`);
    } catch(e) { fail(idx, e.message); }
  }

  { // validate
    const idx = addTest('WebAssembly.validate()');
    try {
      const t0 = performance.now();
      const mod = buildAddModule();
      const valid = WebAssembly.validate(mod);
      const ms = performance.now() - t0;
      if (valid) pass(idx, `Validated ${mod.byteLength}-byte module`, ms);
      else fail(idx, 'validate() returned false');
    } catch(e) { fail(idx, e.message); }
  }

  { // instantiate
    const idx = addTest('WebAssembly.instantiate()');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildAddModule());
      const ms = performance.now() - t0;
      const result = instance.exports.add(17, 25);
      if (result === 42) pass(idx, `<code>add(17, 25) = ${result}</code> ✓`, ms);
      else fail(idx, `add(17,25) = ${result}, expected 42`);
    } catch(e) { fail(idx, e.message); }
  }

  { // sync Module
    const idx = addTest('WebAssembly.Module (sync)');
    try {
      const t0 = performance.now();
      const mod = new WebAssembly.Module(buildAddModule());
      const inst = new WebAssembly.Instance(mod);
      const ms = performance.now() - t0;
      const r = inst.exports.add(100, 200);
      if (r === 300) pass(idx, `<code>new Module() + Instance → add(100,200) = ${r}</code>`, ms);
      else fail(idx, `Expected 300, got ${r}`);
    } catch(e) { fail(idx, e.message); }
  }

  group('Computation');

  { // Fibonacci
    const idx = addTest('Recursive Fibonacci');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildFibModule());
      const fib = instance.exports.fib;
      const vals = [0,1,2,3,4,5,10,20,30].map(n => `fib(${n})=${fib(n)}`);
      const ms = performance.now() - t0;
      if (fib(30) === 832040) pass(idx, `<code>${vals.join(', ')}</code>`, ms);
      else fail(idx, `fib(30) = ${fib(30)}, expected 832040`);
    } catch(e) { fail(idx, e.message); }
  }

  { // Factorial i64
    const idx = addTest('Factorial with i64 (BigInt)');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildFactorialModule());
      const r10 = instance.exports.factorial(10);
      const r20 = instance.exports.factorial(20);
      const ms = performance.now() - t0;
      if (r10 == 3628800n) pass(idx, `<code>10! = ${r10}, 20! = ${r20}</code> (BigInt support ✓)`, ms);
      else fail(idx, `10! = ${r10}, expected 3628800`);
    } catch(e) { fail(idx, e.message); }
  }

  { // Float64
    const idx = addTest('Float64 operations (f64.sqrt, f64.mul)');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildFloatModule());
      const sq = instance.exports.sqrt(144.0);
      const hy = instance.exports.hypot(3.0, 4.0);
      const ms = performance.now() - t0;
      if (Math.abs(sq - 12) < 0.001 && Math.abs(hy - 5) < 0.001)
        pass(idx, `<code>sqrt(144) = ${sq}, hypot(3,4) = ${hy}</code>`, ms);
      else fail(idx, `sqrt(144)=${sq}, hypot(3,4)=${hy}`);
    } catch(e) { fail(idx, e.message); }
  }

  group('Memory & Globals');

  { // Linear memory
    const idx = addTest('Linear Memory (read/write)');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildMemoryModule());
      const { store, load, size, mem } = instance.exports;
      const pages = size();
      store(0, 0xDEADBEEF | 0); store(4, 12345);
      const v0 = load(0) >>> 0, v4 = load(4);
      const ms = performance.now() - t0;
      const fromView = new Uint32Array(mem.buffer)[0] >>> 0;
      if (v0 === 0xDEADBEEF && v4 === 12345 && fromView === 0xDEADBEEF)
        pass(idx, `<code>${pages} page(s), store/load 0xDEADBEEF ✓, ArrayBuffer view ✓</code>`, ms);
      else fail(idx, `v0=0x${v0.toString(16)}, v4=${v4}`);
    } catch(e) { fail(idx, e.message); }
  }

  { // Memory grow
    const idx = addTest('Memory.grow()');
    try {
      const t0 = performance.now();
      const mem = new WebAssembly.Memory({ initial: 1 });
      const before = mem.buffer.byteLength; mem.grow(2);
      const after = mem.buffer.byteLength;
      const ms = performance.now() - t0;
      if (after === 3 * 65536) pass(idx, `<code>Grew from ${before/1024}KB to ${after/1024}KB (1→3 pages)</code>`, ms);
      else fail(idx, `After grow: ${after}`);
    } catch(e) { fail(idx, e.message); }
  }

  { // Mutable globals
    const idx = addTest('Mutable Globals');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildGlobalsModule());
      const { get, inc } = instance.exports;
      const v0 = get(); inc(); inc(); inc(); const v3 = get(); inc(); inc(); const v5 = get();
      const ms = performance.now() - t0;
      if (v0 === 0 && v3 === 3 && v5 === 5)
        pass(idx, `<code>init=${v0}, +3=${v3}, +2=${v5}</code> — mutable globals work`, ms);
      else fail(idx, `${v0},${v3},${v5}`);
    } catch(e) { fail(idx, e.message); }
  }

  group('Advanced Features');

  { // JS imports
    const idx = addTest('JS Function Imports');
    try {
      const t0 = performance.now();
      const received = [];
      const { instance } = await WebAssembly.instantiate(buildImportModule(), { env: { callback: v => received.push(v) } });
      instance.exports.run();
      const ms = performance.now() - t0;
      if (received[0] === 42 && received[1] === 99)
        pass(idx, `<code>WASM called JS with values: [${received}]</code>`, ms);
      else fail(idx, `received: [${received}]`);
    } catch(e) { fail(idx, e.message); }
  }

  { // Table
    const idx = addTest('Table & call_indirect');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildTableModule());
      const d = instance.exports.dispatch;
      const v0 = d(0), v1 = d(1);
      const ms = performance.now() - t0;
      if (v0 === 111 && v1 === 222)
        pass(idx, `<code>dispatch(0)=${v0}, dispatch(1)=${v1}</code> — indirect calls work`, ms);
      else fail(idx, `dispatch(0)=${v0}, dispatch(1)=${v1}`);
    } catch(e) { fail(idx, e.message); }
  }

  { // Streaming compile
    const idx = addTest('WebAssembly.compileStreaming (if supported)');
    try {
      if (typeof WebAssembly.compileStreaming === 'function') {
        const t0 = performance.now();
        const response = new Response(buildAddModule(), { headers: { 'Content-Type': 'application/wasm' } });
        const mod = await WebAssembly.compileStreaming(response);
        const r = new WebAssembly.Instance(mod).exports.add(7, 8);
        const ms = performance.now() - t0;
        if (r === 15) pass(idx, `<code>compileStreaming → add(7,8)=${r}</code>`, ms);
        else fail(idx, `add(7,8) = ${r}`);
      } else pass(idx, '<code>compileStreaming</code> not available (OK, instantiate works)');
    } catch(e) { pass(idx, `compileStreaming issue: <code>${e.message}</code> (non-critical)`); }
  }

  { // Multi-value
    const idx = addTest('Feature: Multi-value returns');
    try {
      const typeContent = vec([[0x60, ...vec([]), ...vec([[0x7f],[0x7f]])]]);
      const funcContent = vec([[0x00]]);
      const exportContent = vec([[...str('pair'), 0x00, ...u32(0)]]);
      const body = [0x00, 0x41, 0x0a, 0x41, 0x14, 0x0b];
      const codeContent = vec([[...u32(body.length), ...body]]);
      const bytes = new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(7, exportContent), ...section(10, codeContent)]);
      const t0 = performance.now();
      const valid = WebAssembly.validate(bytes);
      const ms = performance.now() - t0;
      if (valid) {
        const { instance } = await WebAssembly.instantiate(bytes);
        pass(idx, `<code>pair() = [${instance.exports.pair()}]</code> — multi-value ✓`, ms);
      } else pass(idx, 'Multi-value not supported (non-critical)');
    } catch(e) { pass(idx, `Multi-value: <code>${e.message}</code> (non-critical)`); }
  }

  group('Performance');

  { // Fib benchmark
    const idx = addTest('Fibonacci(35) benchmark');
    try {
      const { instance } = await WebAssembly.instantiate(buildFibModule());
      const fib = instance.exports.fib;
      fib(10); // warmup
      const t0 = performance.now();
      const r = fib(35);
      const ms = performance.now() - t0;
      if (r === 9227465) {
        const speed = ms < 50 ? '🚀 Blazing' : ms < 200 ? '⚡ Fast' : ms < 500 ? '👍 Good' : '🐌 Slow';
        pass(idx, `<code>fib(35) = ${r.toLocaleString()}</code> — ${speed} (${ms.toFixed(1)}ms)`, ms);
      } else fail(idx, `fib(35) = ${r}`);
    } catch(e) { fail(idx, e.message); }
  }

  { // Memory throughput
    const idx = addTest('Memory throughput (1MB write/read)');
    try {
      const mem = new WebAssembly.Memory({ initial: 32 });
      const view = new Uint32Array(mem.buffer);
      const count = 256 * 1024;
      const t0 = performance.now();
      for (let i = 0; i < count; i++) view[i] = i;
      let sum = 0;
      for (let i = 0; i < count; i++) sum += view[i];
      const ms = performance.now() - t0;
      const expected = (count * (count - 1)) / 2;
      if (sum === expected) {
        const mbps = (2 / (ms / 1000)).toFixed(0);
        pass(idx, `<code>1MB write+read, checksum ✓, ~${mbps} MB/s</code>`, ms);
      } else fail(idx, `Checksum mismatch: ${sum} vs ${expected}`);
    } catch(e) { fail(idx, e.message); }
  }

  group('Visual Output');

  { // Mandelbrot
    const idx = addTest('Mandelbrot fractal (256×256, WASM computed)');
    try {
      const t0 = performance.now();
      const { instance } = await WebAssembly.instantiate(buildMandelbrotModule());
      const W = 256, H = 256, maxIter = 80;
      instance.exports.render(W, H, maxIter);
      const ms = performance.now() - t0;
      const data = new Uint8Array(instance.exports.mem.buffer, 0, W * H);
      const canvas = document.getElementById('fractal');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(W, H);
      for (let i = 0; i < W * H; i++) {
        const v = data[i], t = v / maxIter;
        if (v >= maxIter) { img.data[i*4] = 0; img.data[i*4+1] = 0; img.data[i*4+2] = 0; }
        else {
          img.data[i*4]   = Math.floor(9 * (1-t) * t * t * t * 255);
          img.data[i*4+1] = Math.floor(15 * (1-t) * (1-t) * t * t * 255);
          img.data[i*4+2] = Math.floor(8.5 * (1-t) * (1-t) * (1-t) * t * 255);
        }
        img.data[i*4+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      document.getElementById('canvas-section').style.display = '';
      const pps = ((W*H) / (ms/1000) / 1e6).toFixed(2);
      pass(idx, `<code>${W}×${H} @ ${maxIter} iters — ${pps}M pixels/sec</code>`, ms);
    } catch(e) { fail(idx, e.message); }
  }

  group('Error Handling');

  { // Invalid module
    const idx = addTest('Rejects invalid WASM binary');
    try {
      const garbage = new Uint8Array([0x00, 0x61, 0x73, 0x6d, 0xFF, 0xFF, 0xFF, 0xFF]);
      const valid = WebAssembly.validate(garbage);
      if (!valid) pass(idx, '<code>validate(garbage) = false</code> — correctly rejected');
      else fail(idx, 'Validated garbage bytes!');
    } catch(e) { pass(idx, `Threw error on garbage: <code>${e.message}</code>`); }
  }

  { // Trap on unreachable
    const idx = addTest('Traps on unreachable instruction');
    try {
      const typeContent = vec([[0x60, ...vec([]), ...vec([])]]);
      const funcContent = vec([[0x00]]);
      const exportContent = vec([[...str('trap'), 0x00, ...u32(0)]]);
      const body = [0x00, 0x00, 0x0b];
      const codeContent = vec([[...u32(body.length), ...body]]);
      const bytes = new Uint8Array([...HEADER, ...section(1, typeContent), ...section(3, funcContent), ...section(7, exportContent), ...section(10, codeContent)]);
      const { instance } = await WebAssembly.instantiate(bytes);
      try { instance.exports.trap(); fail(idx, 'Did not trap!'); }
      catch(e2) { pass(idx, `<code>RuntimeError: ${e2.message}</code>`); }
    } catch(e) { fail(idx, e.message); }
  }

  { // OOB memory
    const idx = addTest('Traps on out-of-bounds memory access');
    try {
      const { instance } = await WebAssembly.instantiate(buildMemoryModule());
      try { instance.exports.load(99999999); fail(idx, 'Did not trap'); }
      catch(e2) { pass(idx, `<code>${e2.constructor.name}: ${e2.message}</code>`); }
    } catch(e) { fail(idx, e.message); }
  }

  showSummary();
  log(''); log('All tests complete.');
}

runTests().catch(e => log('FATAL: ' + e.message));
</script>
</body>
